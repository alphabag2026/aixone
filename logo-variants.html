<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PumpingTime Logo - Color Variants</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 22px; color: #1a1a1a; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card.dark { background: #1a1a2e; }
        .card h3 { margin-top: 12px; font-size: 13px; color: #666; }
        .card.dark h3 { color: #aaa; }
        .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logo-icon { width: 44px; height: 44px; }
        .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    </style>
</head>
<body>
    <h1>PumpingTime Logo - Color Variants</h1>
    <div class="grid">
        
        <!-- 1. Original: Blue + Green -->
        <div class="card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#2563eb" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g1a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#2563eb"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g1b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g1a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
                            <linearGradient id="g1b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#2563eb">Pumping</span><span style="color:#10b981">Time</span></div>
            </div>
            <h3>1. 블루 + 그린 (현재)</h3>
        </div>

        <!-- 2. Purple + Pink -->
        <div class="card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#7c3aed" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g2a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#7c3aed"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g2b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g2a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
                            <linearGradient id="g2b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#7c3aed">Pumping</span><span style="color:#ec4899">Time</span></div>
            </div>
            <h3>2. 퍼플 + 핑크</h3>
        </div>

        <!-- 3. Orange + Red -->
        <div class="card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#f97316" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g3a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#f97316"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g3b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g3a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
                            <linearGradient id="g3b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#f97316">Pumping</span><span style="color:#ef4444">Time</span></div>
            </div>
            <h3>3. 오렌지 + 레드 (에너지)</h3>
        </div>

        <!-- 4. Cyan + Blue -->
        <div class="card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#06b6d4" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g4a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#06b6d4"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g4b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g4a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
                            <linearGradient id="g4b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#06b6d4">Pumping</span><span style="color:#2563eb">Time</span></div>
            </div>
            <h3>4. 시안 + 블루 (테크)</h3>
        </div>

        <!-- 5. Gold + Black (Dark) -->
        <div class="card dark">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#f59e0b" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g5a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#f59e0b"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g5b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g5a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
                            <linearGradient id="g5b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#f59e0b">Pumping</span><span style="color:#fbbf24">Time</span></div>
            </div>
            <h3>5. 골드 (다크 프리미엄)</h3>
        </div>

        <!-- 6. Neon Green + Dark -->
        <div class="card dark">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#22c55e" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g6a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#22c55e"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g6b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g6a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#4ade80"/></linearGradient>
                            <linearGradient id="g6b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#4ade80"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#22c55e">Pumping</span><span style="color:#4ade80">Time</span></div>
            </div>
            <h3>6. 네온 그린 (다크 해커)</h3>
        </div>

        <!-- 7. Electric Blue + Violet -->
        <div class="card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g7a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#3b82f6"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g7b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g7a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
                            <linearGradient id="g7b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#3b82f6">Pumping</span><span style="color:#8b5cf6">Time</span></div>
            </div>
            <h3>7. 일렉트릭 블루 + 바이올렛</h3>
        </div>

        <!-- 8. Red + Gold -->
        <div class="card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="21" r="16" stroke="#dc2626" stroke-width="2.5" fill="none" opacity="0.2"/>
                        <circle cx="20" cy="21" r="16" stroke="url(#g8a)" stroke-width="2.5" fill="none" stroke-dasharray="75 100" stroke-linecap="round"/>
                        <rect x="18" y="2" width="4" height="5" rx="2" fill="#dc2626"/>
                        <path d="M12 28 L17 23 L22 25 L30 15" stroke="url(#g8b)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M26 14 L30.5 14.5 L30 19" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <defs>
                            <linearGradient id="g8a" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
                            <linearGradient id="g8b" x1="12" y1="28" x2="30" y2="15"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text"><span style="color:#dc2626">Pumping</span><span style="color:#f59e0b">Time</span></div>
            </div>
            <h3>8. 레드 + 골드 (강렬)</h3>
        </div>

    </div>
</body>
</html>
